<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FF9500">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>毛孩子健康助手</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="app">
    <!-- TabBar -->
    <nav class="tabbar" id="tabbar">
      <div class="tab-item active" data-tab="home">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">首页</span>
      </div>
      <div class="tab-item" data-tab="diagnosis">
        <span class="tab-icon">🔬</span>
        <span class="tab-label">AI诊断</span>
      </div>
      <div class="tab-item" data-tab="community">
        <span class="tab-icon">🌟</span>
        <span class="tab-label">社区</span>
      </div>
      <div class="tab-item" data-tab="reminders">
        <span class="tab-icon">⏰</span>
        <span class="tab-label">提醒</span>
        <span class="tab-badge" id="reminderBadge" style="display:none;">0</span>
      </div>
    </nav>

    <!-- Pages Container -->
    <div id="pagesContainer"></div>

    <!-- Modal -->
    <div class="modal-mask" id="modalMask">
      <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
